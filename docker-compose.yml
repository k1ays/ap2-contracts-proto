version: "3.9"

services:
  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "9091:9091"
    environment:
      PAYMENT_DB_DSN: postgres://postgres:postgres@payment-db:5432/payment_db?sslmode=disable
      PAYMENT_GRPC_ADDR: ":9091"
    depends_on:
      payment-db:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      ORDER_DB_DSN: postgres://postgres:postgres@order-db:5432/order_db?sslmode=disable
      ORDER_ADDR: ":8080"
      ORDER_GRPC_ADDR: ":9090"
      PAYMENT_GRPC_ADDR: payment-service:9091
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started

volumes:
  order-db-data:
  payment-db-data:
