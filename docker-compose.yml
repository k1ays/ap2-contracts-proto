services:
  order-db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    env_file: .env
    ports:
      - "50051:50051"
    environment:
      PAYMENT_DB_DSN: postgres://postgres:postgres@payment-db:5432/payment_db?sslmode=disable
      PAYMENT_GRPC_ADDR: ":50051"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      ORDER_DB_DSN: postgres://postgres:postgres@order-db:5432/order_db?sslmode=disable
      ORDER_ADDR: ":8080"
      ORDER_GRPC_ADDR: ":9090"
      PAYMENT_GRPC_ADDR: payment-service:50051
      REDIS_ADDR: redis:6379
      CACHE_TTL: ${CACHE_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW}
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    env_file: .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
      PROVIDER_MODE: ${PROVIDER_MODE}
      MAX_RETRIES: ${MAX_RETRIES}
      INITIAL_BACKOFF: ${INITIAL_BACKOFF}
      WORKER_COUNT: ${WORKER_COUNT}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  order-db-data:
  payment-db-data:
  rabbitmq-data:
  redis-data:
